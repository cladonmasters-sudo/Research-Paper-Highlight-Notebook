<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Reading Notebook</title>
  <link rel="stylesheet" href="./style.css?v=30" />
</head>
<body>
  <header>
    <h1>Research Reading Notebook</h1>
    <p>Save journal notes, quotes, findings, and export them for Chapter 2.</p>
  </header>

  <main>
    <section class="panel">
      <h2>Article Details</h2>

      <label>Article Title</label>
      <input id="title" placeholder="Title of the journal article" />

      <label>Author/s</label>
      <input id="authors" placeholder="Example: Smith and Cruz" />

      <label>Year</label>
      <input id="year" placeholder="Example: 2024" />

      <label>Journal / Source</label>
      <input id="journal" placeholder="Name of journal or website" />

      <label>DOI / URL</label>
      <input id="url" placeholder="Paste DOI or article link" />

      <label>Tags</label>
      <input id="tags" placeholder="Example: inclusive education, ESL, SPED" />

      <button onclick="saveArticle()">Save Article Notes</button>
      <button onclick="loadArticle()">Load Saved Notes</button>
      <button onclick="exportCurrentWord()">Export Current Article to Word</button>
      <button onclick="exportAllWord()">Export All Notes to Word</button>
      <button onclick="exportBackup()">Download Backup JSON</button>
      <button onclick="recoverOldNotes()">Recover Old Saved Notes</button>
    </section>

    <section class="workspace">
      <h2>Reading Notes</h2>

      <label>Summary</label>
      <textarea id="summary" placeholder="Write the article summary here..."></textarea>

      <label>Important Findings</label>
      <textarea id="findings" placeholder="List the important findings..."></textarea>

      <label>Direct Quotes</label>
      <textarea id="quotes" placeholder="Paste short direct quotes here..."></textarea>

      <label>Reflection / My Understanding</label>
      <textarea id="reflection" placeholder="What did you understand from this article?"></textarea>

      <label>Possible Use in My Research</label>
      <textarea id="useInResearch" placeholder="How can this help your Chapter 2, framework, gap, or methodology?"></textarea>

      <label>APA 7 Citation</label>
      <textarea id="apa" placeholder="Write or paste APA 7 citation here..."></textarea>

      <div id="status"></div>
    </section>
  </main>

  <script src="./script.js?v=30"></script>
</body>
</html>
