<!DOCTYPE html>
<html>
<head>
    <title>Research Paper Notebook</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Research Paper Notebook</h1>

<input type="file" id="pdfUpload" accept=".pdf">

<div class="container">

    <div class="pdf-section">
        <h2>PDF Reader</h2>
        <div id="viewer">Upload a PDF to begin.</div>
    </div>

    <div class="notes-section">
        <h2>Research Notebook</h2>

        <select id="category">
            <option>Introduction</option>
            <option>Literature Review</option>
            <option>Methodology</option>
            <option>Findings</option>
            <option>Discussion</option>
            <option>Conclusion</option>
            <option>Personal Notes</option>
        </select>

        <textarea id="noteInput" placeholder="Type or paste your notes here..."></textarea>

        <button onclick="saveNote()">Save Note</button>
        <button onclick="clearNotes()">Clear Notes</button>

        <h3>Saved Notes</h3>
        <div id="notesList"></div>

        <hr>

        <h2>Research Matrix</h2>

        <input type="text" id="author" placeholder="Author">
        <input type="text" id="year" placeholder="Year">
        <input type="text" id="purpose" placeholder="Purpose of Study">
        <input type="text" id="method" placeholder="Research Method">

        <textarea id="findings" placeholder="Key Findings"></textarea>
        <textarea id="relevance" placeholder="Relevance to Your Study"></textarea>

        <button onclick="addMatrixEntry()">Add Matrix Entry</button>
        <button onclick="clearMatrix()">Clear Matrix</button>

        <input type="text" id="matrixSearch" placeholder="Search matrix..." oninput="displayMatrix()">

        <button onclick="sortMatrixByAuthor()">Sort by Author</button>
        <button onclick="sortMatrixByYear()">Sort by Year</button>
<input type="text" id="matrixSearch" placeholder="Search matrix..." oninput="displayMatrix()">

<button onclick="sortMatrixByAuthor()">Sort by Author</button>
<button onclick="sortMatrixByYear()">Sort by Year</button>
        <table id="matrixTable">
            <thead>
                <tr>
                    <th>Author</th>
                    <th>Year</th>
                    <th>Purpose</th>
                    <th>Method</th>
                    <th>Findings</th>
                    <th>Relevance</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <button onclick="exportData()">Export Research Data to Word</button>
    </div>
<input type="text" id="matrixSearch" placeholder="Search matrix..." oninput="displayMatrix()">

<hr>

<h2>APA 7 Citation Generator</h2>

<input type="text" id="citeAuthor" placeholder="Author(s)">
<input type="text" id="citeYear" placeholder="Year">
<input type="text" id="citeTitle" placeholder="Article Title">
<input type="text" id="citeJournal" placeholder="Journal Name">
<input type="text" id="citeVolume" placeholder="Volume">
<input type="text" id="citeIssue" placeholder="Issue">
<input type="text" id="citePages" placeholder="Pages">
<input type="text" id="citeDOI" placeholder="DOI or URL">

<button onclick="generateCitation()">
Generate APA Citation
</button>

<textarea
id="citationOutput"
placeholder="Generated APA citation will appear here..."
readonly>
</textarea>
</div>

<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script src="script.js"></script>

</body>
</html>
