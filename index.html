<!DOCTYPE html>
<html>
<head>
    <title>Research Paper Notebook</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Research Paper Notebook</h1>

<input type="file" id="pdfUpload" accept=".pdf">

<div class="container">

    <div class="pdf-section">
        <h2>PDF Reader</h2>
        <div id="viewer">Upload a PDF to begin.</div>
    </div>

    <div class="notes-section">
        <h2>Research Notebook</h2>

        <select id="category">
            <option>Introduction</option>
            <option>Literature Review</option>
            <option>Methodology</option>
            <option>Findings</option>
            <option>Discussion</option>
            <option>Conclusion</option>
            <option>Personal Notes</option>
        </select>

        <div class="toolbar">
            <button onclick="formatText('bold')"><b>B</b></button>
            <button onclick="formatText('italic')"><i>I</i></button>
            <button onclick="formatText('underline')"><u>U</u></button>
            <button onclick="formatText('insertUnorderedList')">• List</button>
            <button onclick="formatText('insertOrderedList')">1. List</button>
        </div>

        <div id="noteInput" contenteditable="true" class="rich-editor"></div>

        <button onclick="saveNote()" id="saveNoteBtn">Save Note</button>
        <button onclick="cancelEdit()" id="cancelEditBtn" style="display:none;">Cancel Edit</button>
        <button onclick="clearNotes()">Clear All Notes</button>

        <h3>Saved Notes</h3>
        <div id="notesList"></div>

        <hr>

        <h2>Research Matrix</h2>

        <input type="text" id="author" placeholder="Author">
        <input type="text" id="year" placeholder="Year">
        <input type="text" id="purpose" placeholder="Purpose of Study">
        <input type="text" id="method" placeholder="Research Method">

        <textarea id="findings" placeholder="Key Findings"></textarea>
        <textarea id="relevance" placeholder="Relevance to Your Study"></textarea>

        <button onclick="addMatrixEntry()">Add Matrix Entry</button>
        <button onclick="clearMatrix()">Clear Matrix</button>

        <input type="text" id="matrixSearch" placeholder="Search matrix..." oninput="displayMatrix()">

        <button onclick="sortMatrixByAuthor()">Sort by Author</button>
        <button onclick="sortMatrixByYear()">Sort by Year</button>

        <table id="matrixTable">
            <thead>
                <tr>
                    <th>Author</th>
                    <th>Year</th>
                    <th>Purpose</th>
                    <th>Method</th>
                    <th>Findings</th>
                    <th>Relevance</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <button onclick="exportData()">Export Research Data to Word</button>

        <hr>

        <h2>APA 7 Citation Generator</h2>

        <input type="text" id="citeAuthor" placeholder="Reference Author(s), e.g., Chong, J. P. W., & Graham, L. J.">
        <input type="text" id="citeShortAuthor" placeholder="In-text Author(s), e.g., Chong & Graham">
        <input type="text" id="citeYear" placeholder="Year">
        <input type="text" id="citeTitle" placeholder="Article Title">
        <input type="text" id="citeJournal" placeholder="Journal Name">
        <input type="text" id="citeVolume" placeholder="Volume">
        <input type="text" id="citeIssue" placeholder="Issue">
        <input type="text" id="citePages" placeholder="Pages">
        <input type="text" id="citeDOI" placeholder="DOI or URL">

        <textarea id="quoteText" placeholder="Paste specific sentence or direct quote here..."></textarea>
        <input type="text" id="citePage" placeholder="Page Number">

        <button onclick="generateReferenceCitation()">Generate Reference List Citation</button>
        <button onclick="generateNarrativeCitation()">Generate Narrative Citation</button>
        <button onclick="generateParentheticalCitation()">Generate Parenthetical Citation</button>
        <button onclick="generateDirectQuoteCitation()">Generate Direct Quote Citation</button>
        <button onclick="clearCitationFields()">Clear Citation Fields</button>

        <textarea id="citationOutput" placeholder="Generated citation will appear here..." readonly></textarea>
    </div>

</div>

<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script src="script.js"></script>

</body>
</html>
